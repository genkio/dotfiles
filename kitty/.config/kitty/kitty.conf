# kitty.conf - main terminal config.
#
# Theme: baseline light first so colors always exist, then the active file LAST so
# it wins (Flexoki Light in light, TokyoNight Storm in dark). apply-kitty-theme.sh
# rewrites the active file on each flip and SIGUSR1s kitty to reload it live.
# A missing active file is non-fatal: kitty just keeps the light baseline.
include themes/flexoki-light.conf
include ${HOME}/.cache/dotfiles/kitty-theme-active.conf

font_size 14.0
scrollback_lines 10000
window_padding_width 2

# option-as-alt so Meta chords reach tmux/nvim instead of typing accented chars.
macos_option_as_alt both

# Hide the titlebar for a clean look; windows are managed via Hammerspoon
# (rcmd), not titlebar dragging.
hide_window_decorations titlebar-only

# tmux runs in every window, so kitty's default "program is running" prompt would
# fire on every close. Disable it.
confirm_os_window_close 0

# Tab bar (shows only with 2+ kitty tabs; tmux handles the usual window list).
# Slanted powerline beats the default fade; top edge so it doesn't stack with
# tmux's bottom status bar. Tab colors live in the theme files.
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
active_tab_font_style bold

# Let apps both read and write the clipboard via OSC52 (tmux copy over SSH
# relies on the write half).
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Remote control socket so Hammerspoon's rcmd launcher can open windows inside
# this instance (rcmd.lua targets /tmp/kitty-<pid>; kitty appends the PID to the
# listen_on path). socket-only keeps control off the implicit env-var path.
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# send_text takes Python escapes (\x1b = ESC); `all` fires in every keyboard mode.

# Shift+Enter -> ESC CR, so the shell/nvim/Claude get a multi-line newline.
map shift+enter send_text all \x1b\r

# Cmd+Shift+n/p -> tmux session next/prev. tmux bind has no Cmd modifier, so emit a
# private escape here and let tmux user-keys catch these exact bytes.
map cmd+shift+n send_text all \x1b[120~
map cmd+shift+p send_text all \x1b[121~

# Ctrl+Shift+Left/Right are kitty's default tab-nav; unmapping (empty action)
# lets the chord reach tmux's swap-window reorder bind. Alacritty had no such
# default, which is why this worked before the migration.
map ctrl+shift+left
map ctrl+shift+right

# Cmd+1..8 -> tmux window index 0..7, Cmd+9 -> last window (Cmd+0 left to kitty).
# tmux catches these as user-keys; keep in sync with .tmux.conf.
map cmd+1 send_text all \x1b[122~
map cmd+2 send_text all \x1b[123~
map cmd+3 send_text all \x1b[124~
map cmd+4 send_text all \x1b[125~
map cmd+5 send_text all \x1b[126~
map cmd+6 send_text all \x1b[127~
map cmd+7 send_text all \x1b[128~
map cmd+8 send_text all \x1b[129~
map cmd+9 send_text all \x1b[130~

# Cmd+Shift+u/d/j/k -> Claude Code transcript scroll. Emit the alt+shift encoding
# (ESC + letter): tmux forwards it untouched, Claude binds alt+shift+*.
map cmd+shift+u send_text all \x1bU
map cmd+shift+d send_text all \x1bD
map cmd+shift+j send_text all \x1bJ
map cmd+shift+k send_text all \x1bK
