set -g mouse on
set -g history-limit 10000
setw -g mode-keys vi

# make the active pane obvious (thicker border + subtle gutter contrast)
set -g pane-border-lines heavy
# inherit terminal background so light/dark transitions cleanly
set -g window-style "bg=default"
set -g window-active-style "bg=default"

# use c-j and c-f for the prefix
set-option -g prefix C-j
set-option -g prefix2 C-f

# easy config reload
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# status bar
set-option -g status on
set-option -g status-left-length 14
set-option -g status-right-length 64
# theme colors (status bar, pane borders, window list) are applied by
# tmux/bin/apply-theme.sh, re-run by theme-toggle.sh (prefix+t) on a flip

# prefix+t: flip the whole session's theme - nvim/lazygit/tmux + the terminal
# itself (via OSC). One manual toggle, local or SSH. (Uppercase T = pane label.)
bind t run-shell "$HOME/dotfiles/scripts/theme-toggle.sh" \; display-message "theme toggled"

# Show custom label when set, otherwise running command
set -g pane-border-status top
set -g pane-border-format ' #{?@pane_label,#{@pane_label},#(pgrep -P #{pane_pid} | xargs -r ps -o args= -p | head -n1)} '
bind T command-prompt -I "#{@pane_label}" -p "pane label:" 'set -p @pane_label "%1"'
# parse then copy first number from pane label (e.g., "5341: title" -> "5341")
bind P run-shell 'label=$(tmux show -p -v -t "#{pane_id}" @pane_label 2>/dev/null); pr=$(printf "%s" "$label" | grep -o -E "[0-9]+" | head -n1); if [ -n "$pr" ]; then printf "%s" "$pr" | pbcopy; tmux display-message "Copied: $pr"; else tmux display-message "No number in pane label"; fi'

# make active window pop in status bar.
# overlay precedence (most urgent first):
#   red    -- agent needs the user's approval on something
#   orange -- agent is actively working in that window
#   green  -- agent finished and the user is on another window
# driven by claude/codex hooks calling tmux/bin/agent-{busy,idle,attention}.sh,
# which set @agent_busy / @agent_awaiting / @agent_attention.
# the same hooks also set @agent_pane_state on the agent's own pane, which
# colours that single pane's border while it is INACTIVE (red=needs
# approval, orange=working); see apply-theme.sh. the active pane always
# shows the plain active border, so focusing a pane overrides its agent
# colour. borders only render for the visible window, so there is no green
# "finished" border -- that signal stays window-level above.
# the #, escapes a comma inside the conditional, since tmux's
# #{?cond,then,else} parser splits on commas without tracking #[...].
set-hook -g 'session-window-changed[999]' 'set-window-option -q @agent_awaiting 0 ; set-window-option -q @agent_attention 0'

# seed the tmux palette for the current theme at startup
run-shell "$HOME/dotfiles/tmux/bin/apply-theme.sh"

# Clear any @agent_* flags that survived from a previous server
# lifetime. @agent_init_done is a server-level marker that dies with
# the server but persists across `source-file` reloads, so the sweep
# runs exactly once per server start and a manual conf reload never
# wipes live agent state.
if-shell -F '#{!=:#{@agent_init_done},1}' \
  'set-option -g @agent_init_done 1 ; run-shell -b "$HOME/dotfiles/tmux/bin/agent-clear-all.sh"'

# prompt for a window name, create it in current path
bind c command-prompt -p "window name:" 'new-window -n "%1" -c "#{pane_current_path}"'
# -F: window rows carry the agent state colours (@tree_format from apply-theme.sh)
bind w choose-tree -Zw -F '#{E:@tree_format}'

# create panes in current path
bind v split-window -h -c "#{pane_current_path}" \; select-layout -E
bind h split-window -v -c "#{pane_current_path}" \; select-layout -E
# rebalance panes whenever one closes (cover both hooks for tmux versions)
# use background run-shell so it fires after tmux removes the pane
set-hook -g pane-died 'run -b "tmux select-layout -E"'
set-hook -g pane-exited 'run -b "tmux select-layout -E"'
set-hook -g after-kill-pane "select-layout -E"

# toggle zoom without prefix (Ctrl+Z or Ctrl+Up)
bind -n C-z resize-pane -Z
# C-Up duplicates C-z for iPhone terminal app: its tap-shortcuts only emit ctrl+arrow (macOS shadows it locally)
bind -n C-Up resize-pane -Z
# drop tmux's default prefix z (full zoom); C-z / C-Up cover it
unbind z

# half zoom (mirroring C-z/C-Up full zoom): maximize the current pane along one
# axis instead of the whole screen. The pane sharing that column/row shrinks to
# a 1-cell sliver (tmux can't fully hide a single pane). Per-axis, per-pane
# toggle, so one pane per column and one per row can be maxed at once (e.g. a
# left and a right pane both). The script's dim arg is the tmux resize
# dimension, the opposite letter to the axis it fills:
#   C-x -> dim y: grow height, fill the column (full vertical space)
#   C-y -> dim x: grow width,  fill the row    (full horizontal space)
# Root-table C-x/C-y eat those keys inside panes (readline yank, emacs) - same
# tradeoff as C-z losing suspend.
bind -n C-x run-shell "$HOME/dotfiles/tmux/bin/half-zoom.sh #{pane_id} #{window_id} y"
bind -n C-y run-shell "$HOME/dotfiles/tmux/bin/half-zoom.sh #{pane_id} #{window_id} x"

# iOS/WebSSH-friendly copy-mode toggle (Ctrl+/)
bind -n C-/ if-shell -F "#{pane_in_mode}" "send-keys -X cancel" "copy-mode"
# many terminals encode Ctrl+/ as C-_
bind -n C-_ if-shell -F "#{pane_in_mode}" "send-keys -X cancel" "copy-mode"

# close pane
bind x kill-pane \; select-layout -E
# close all other panes in window
bind X kill-pane -a

# break the current pane out into its own window and follow it, then
# spread-out the panes it left behind. break-pane fires none of the
# pane-died/exited hooks above, so rebalance the source window by id.
bind b run-shell 'tmux break-pane -s "#{pane_id}"; tmux select-layout -t "#{window_id}" -E'

# prefix + a: fzf file picker in a popup; pastes the chosen path into the agent
# pane to attach an image to Claude Code / Codex (both attach an image from a
# pasted path). fzf not yazi: yazi's terminal probe wedges in a popup overlay
# (yazi#2308). The script resolves its own target pane (display-popup leaves
# #{pane_id} empty in its shell-command).
bind a display-popup -E -w 90% -h 90% -d "#{pane_current_path}" -T " attach file " \
  "$HOME/dotfiles/tmux/bin/attach-file.sh"

# prefix + m: herdlet agent monitor in a popup. Live view of every coding
# agent across sessions (working / blocked / done, sorted blocked-first),
# fed by the same claude/codex hooks that drive the @agent_* overlays.
# 1-9 jumps to that agent's pane, q closes. Overrides default m (mark pane).
bind m display-popup -E -w 80% -h 60% -T " agents " "herdlet monitor"

# navigate between panes with ctrl + nav keys
# source-file updates bindings but does not remove deleted ones
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
# copy-mode has its own key table, so the root binds above are shadowed
# while a pane is in scrollback. rebind here too, else nav dies in copy-mode.
# overrides defaults (C-h cursor-left, C-j copy-pipe) which h and y/Enter cover.
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# show windows (= prefix+w); ctrl+arrow so iPhone terminal app can map it to a one-tap shortcut
bind -n C-Down choose-tree -Zw -F '#{E:@tree_format}'

# C-Right arms the prefix: iPhone terminal one-tap shortcut for the leader key.
# switch-client -T prefix acts like C-j/C-f (tmux caps real prefixes at two, so a
# 3rd trigger needs this). Root C-Right eats readline forward-word, like C-z/C-x/C-y.
bind -n C-Right switch-client -T prefix

# navigate between windows with shift arrow
bind -n S-Left previous-window
bind -n S-Right next-window

# navigate between windows with ctrl + n/p
bind -n C-p previous-window
bind -n C-n next-window

# jump to window by index with cmd + digit. tmux bind has no Cmd modifier, so
# Alacritty emits a private escape per chord (see alacritty.toml) caught here as
# user-keys. cmd+1..8 -> window index 0..7, cmd+9 -> last (cmd+0 left to Alacritty to reset font size).
set -s user-keys[2] "\e[122~"
set -s user-keys[3] "\e[123~"
set -s user-keys[4] "\e[124~"
set -s user-keys[5] "\e[125~"
set -s user-keys[6] "\e[126~"
set -s user-keys[7] "\e[127~"
set -s user-keys[8] "\e[128~"
set -s user-keys[9] "\e[129~"
set -s user-keys[10] "\e[130~"
bind -n User2 select-window -t :=0
bind -n User3 select-window -t :=1
bind -n User4 select-window -t :=2
bind -n User5 select-window -t :=3
bind -n User6 select-window -t :=4
bind -n User7 select-window -t :=5
bind -n User8 select-window -t :=6
bind -n User9 select-window -t :=7
bind -n User10 select-window -t :$

# move/reorder window position with shift + ctrl + arrow
bind -n C-S-Left swap-window -t -1 \; previous-window
bind -n C-S-Right swap-window -t +1 \; next-window

# navigate between sessions with prefix + n/p (bare C-n/C-p do windows)
bind -r p switch-client -p
bind -r n switch-client -n

# Cmd+Shift+n/p also switch sessions. tmux bind has no Cmd modifier, so Alacritty
# emits a private escape per chord (see alacritty.toml) and we catch the exact
# bytes as user-keys. Keep these in sync with alacritty.toml.
set -s user-keys[0] "\e[120~"
set -s user-keys[1] "\e[121~"
bind -n User0 switch-client -n
bind -n User1 switch-client -p

# Nested tmux: F12 puts the LOCAL (outer) tmux to sleep so every key (prefix,
# S-Left/Right, panes, copy-mode, mouse) passes through to the inner session,
# e.g. tmux over SSH. F12 again wakes it. F12 itself stays bound in the `off`
# table so it always wakes you back and never reaches the remote. These are
# session-level overrides; `set -u` on resume restores the themed globals.
bind -T root F12 \
  set prefix None \;\
  set prefix2 None \;\
  set key-table off \;\
  set mouse off \;\
  set status-style 'bg=#87cefa,fg=#1c1c1c,bold' \;\
  set status-left-style 'bg=#87cefa,fg=#1c1c1c,bold' \;\
  set status-left-length 40 \;\
  set status-left ' LOCAL TMUX OFF (F12 to resume) ' \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u prefix2 \;\
  set -u key-table \;\
  set -u mouse \;\
  set -u status-style \;\
  set -u status-left-style \;\
  set -u status-left-length \;\
  set -u status-left \;\
  refresh-client -S

# synchronize panes
bind y set-window-option synchronize-panes\; display-message "synchronize mode toggled."

# copy-mode selections -> OSC52 (works local + remote) and pbcopy locally
set -g @copy_helper "$HOME/dotfiles/tmux/bin/osc52-copy.sh"

# Copy while staying in copy-mode to avoid jumping back to the live buffer
bind-key -T copy-mode-vi y send-keys -X copy-selection \; run-shell -b "tmux save-buffer - | #{@copy_helper} #{q:client_tty} #{q:client_termname}"
bind-key -T copy-mode-vi Enter send-keys -X copy-selection \; run-shell -b "tmux save-buffer - | #{@copy_helper} #{q:client_tty} #{q:client_termname}"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X stop-selection \; send-keys -X copy-selection-no-clear \; run-shell -b "tmux save-buffer - | #{@copy_helper} #{q:client_tty} #{q:client_termname}"

# forward terminal focus events to tmux (harmless if the terminal
# doesn't emit them; future-proof for terminals that do).
set -g focus-events on

# enable osc 52 clipboard support for ssh
set -g allow-passthrough on
set -s set-clipboard on
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:clipboard'
# Force truecolor passthrough for every outer terminal. Alacritty doesn't
# forward an RGB-capable terminfo over SSH, so the remote client attaches as
# xterm-256color and tmux would otherwise downsample nvim/lazygit's 24-bit
# colors to a washed-out 256-color palette.
set -as terminal-features ',*:RGB'
set -ag terminal-overrides ',*:Ms=\\E]52;c;%p2%s\\7'

# preserve ssh connection info for clipboard support
set -ga update-environment " SSH_CONNECTION SSH_CLIENT SSH_TTY"

# tmux plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'genkio/tmux-open-usage'
set -g @plugin 'genkio/tmux-spoony'
set -g @tmux_open_usage_enabled 'off'
# Restore pane output after a restart by replaying saved pane contents.
set -g @resurrect-capture-pane-contents 'on'
# Belt-and-suspenders: after a tmux-resurrect restore, sweep any
# @agent_* flags off all windows. Resurrect doesn't persist these
# per-window options today, but a future version or custom save
# script could, and the cost of an extra sweep is negligible.
set -g @resurrect-hook-post-restore-all "$HOME/dotfiles/tmux/bin/agent-clear-all.sh"

if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' "run '~/.tmux/plugins/tpm/tpm'" 'display-message "TPM missing: clone ~/.tmux/plugins/tpm, then press prefix + I"'
