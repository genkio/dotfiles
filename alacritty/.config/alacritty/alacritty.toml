[general]
# Baseline first so colors exist before the active file is ever written. The
# active file (rewritten by scripts/apply-alacritty-theme.sh on each theme
# switch) is LAST so it wins: Flexoki in light, TokyoNight in dark.
# live_config_reload applies the rewrite without restarting Alacritty.
import = [
  "~/.config/alacritty/themes/flexoki-light.toml",
  "~/.cache/dotfiles/alacritty-theme-active.toml",
]
live_config_reload = true

[font]
size = 14.0

[scrolling]
history = 10000

[window]
option_as_alt = "Both"
decorations = "Buttonless"
padding = { x = 2, y = 2 }

[terminal]
osc52 = "CopyPaste"

[keyboard]
bindings = [
  { key = "Enter", mods = "Shift", chars = "\u001B\r" },
  # Default ViMode toggle is ctrl+shift+space, but the CJK input method eats
  # that chord before Alacritty sees it. Cmd chords bypass the IME and never
  # reach tmux/nvim, so this can't be shadowed.
  { key = "Space", mods = "Command|Shift", action = "ToggleViMode" },
  # Cmd+Shift+n/p -> tmux session next/prev. tmux bind has no Cmd modifier, so
  # emit a private escape here and let tmux user-keys catch these exact bytes.
  { key = "N", mods = "Command|Shift", chars = "\u001B[120~" },
  { key = "P", mods = "Command|Shift", chars = "\u001B[121~" },
  # Cmd+1..8 -> tmux window index 0..7, Cmd+9 -> last window (Cmd+0 left to
  # Alacritty's own default). tmux catches as user-keys; sync with .tmux.conf.
  { key = "1", mods = "Command", chars = "\u001B[122~" },
  { key = "2", mods = "Command", chars = "\u001B[123~" },
  { key = "3", mods = "Command", chars = "\u001B[124~" },
  { key = "4", mods = "Command", chars = "\u001B[125~" },
  { key = "5", mods = "Command", chars = "\u001B[126~" },
  { key = "6", mods = "Command", chars = "\u001B[127~" },
  { key = "7", mods = "Command", chars = "\u001B[128~" },
  { key = "8", mods = "Command", chars = "\u001B[129~" },
  { key = "9", mods = "Command", chars = "\u001B[130~" },
  # Cmd+Shift+u/d/j/k -> Claude Code transcript scroll. Cmd never reaches the
  # pty and tmux has extended-keys off, so emit the alt+shift encoding
  # (ESC + letter): tmux forwards it untouched, Claude binds alt+shift+*.
  { key = "U", mods = "Command|Shift", chars = "\u001BU" },
  { key = "D", mods = "Command|Shift", chars = "\u001BD" },
  { key = "J", mods = "Command|Shift", chars = "\u001BJ" },
  { key = "K", mods = "Command|Shift", chars = "\u001BK" },
]

