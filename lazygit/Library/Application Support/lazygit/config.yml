os:
  # Ensure lazygit pipes the text to our OSC52 helper (works in tmux + SSH, mirrors to pbcopy locally)
  copyToClipboardCmd: "$HOME/dotfiles/lazygit/bin/osc52-clip.sh {{text}}"
  edit: "$HOME/dotfiles/lazygit/bin/open-in-tmux-pane.sh down {{filename}}"
  editAtLine: "$HOME/dotfiles/lazygit/bin/open-in-tmux-pane.sh down {{filename}} {{line}}"
  editAtLineAndWait: "$HOME/dotfiles/lazygit/bin/open-in-tmux-pane.sh down {{filename}} {{line}}"
  editInTerminal: true
  open: "$HOME/dotfiles/lazygit/bin/open-in-tmux-pane.sh right {{filename}}"
  openCommand: "$HOME/dotfiles/lazygit/bin/open-in-tmux-pane.sh right {{filename}}"
keybinding:
  universal:
    edit: o
    openFile: e
gui:
  enlargedSideViewLocation: top
  portraitMode: always
  screenMode: half
  showCommandLog: false
git:
  pagers:
    - pager: delta --paging=never
